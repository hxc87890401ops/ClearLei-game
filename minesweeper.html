    <script>
        // ===== 封面动画 =====
        class CoverAnimation {
            constructor() {
                this.coverBg = document.getElementById('coverBg');
                this.init();
            }

            init() {
                this.createParticles();
            }

            createParticles() {
                const colors = ['#e94560', '#f39c12', '#3498db', '#27ae60', '#9b59b6'];
                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 8 + 3;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                    particle.style.animationDelay = (Math.random() * 10) + 's';
                    particle.style.opacity = Math.random() * 0.5 + 0.3;
                    this.coverBg.appendChild(particle);
                }
            }
        }

        // ===== 音效风格管理器 =====
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.soundEnabled = true;
                this.musicEnabled = false;
                this.currentStyle = 'nature';
                this.musicGain = null;
                this.musicNodes = [];
                this.musicInterval = null;
            }

            init() {
                if (this.audioContext) return;
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.musicGain = this.audioContext.createGain();
                this.musicGain.gain.value = 0.2;
                this.musicGain.connect(this.audioContext.destination);
            }

            setStyle(style) {
                const wasPlaying = this.musicEnabled;
                if (wasPlaying) this.stopMusic();
                this.currentStyle = style;
                if (wasPlaying) this.startMusic();
            }

            playSound(type) {
                if (!this.soundEnabled) return;
                this.init();
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                switch(this.currentStyle) {
                    case 'nature': this.playNatureSound(type, now); break;
                    case 'tech': this.playTechSound(type, now); break;
                    case 'piano': this.playPianoSound(type, now); break;
                    case 'space': this.playSpaceSound(type, now); break;
                    case 'retro': this.playRetroSound(type, now); break;
                }
            }

            playNatureSound(type, now) {
                const ctx = this.audioContext;
                switch(type) {
                    case 'click': this.playWaterDrop(now); break;
                    case 'reveal': this.playLeafRustle(now); break;
                    case 'flag': this.playBirdChirp(now); break;
                    case 'win': this.playNatureWin(now); break;
                    case 'lose': this.playThunder(now); break;
                }
            }

            playWaterDrop(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            }

            playLeafRustle(now) {
                const ctx = this.audioContext;
                const noise = this.createNoiseBuffer(0.1);
                const source = ctx.createBufferSource();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();
                source.buffer = noise;
                filter.type = 'bandpass';
                filter.frequency.value = 3000;
                filter.Q.value = 0.5;
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
            }

            playBirdChirp(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.setValueAtTime(1400, now + 0.05);
                osc.frequency.setValueAtTime(1100, now + 0.1);
                osc.frequency.setValueAtTime(1500, now + 0.15);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            }

            playNatureWin(now) {
                const ctx = this.audioContext;
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const t = now + i * 0.15;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.4);
                });
            }

            playThunder(now) {
                const ctx = this.audioContext;
                const noise = this.createNoiseBuffer(0.5);
                const source = ctx.createBufferSource();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();
                source.buffer = noise;
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
            }

            playTechSound(type, now) {
                const ctx = this.audioContext;
                switch(type) {
                    case 'click': this.playBeep(now, 880, 0.08); break;
                    case 'reveal': this.playBeep(now, 440, 0.1); break;
                    case 'flag': this.playTechFlag(now); break;
                    case 'win': this.playTechWin(now); break;
                    case 'lose': this.playTechLose(now); break;
                }
            }

            playBeep(now, freq, dur) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + dur);
            }

            playTechFlag(now) {
                const ctx = this.audioContext;
                [880, 1100, 1320].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    const t = now + i * 0.04;
                    gain.gain.setValueAtTime(0.12, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.05);
                });
            }

            playTechWin(now) {
                const ctx = this.audioContext;
                const notes = [523, 659, 784, 1047, 1318];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    const t = now + i * 0.1;
                    gain.gain.setValueAtTime(0.15, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.2);
                });
            }

            playTechLose(now) {
                const ctx = this.audioContext;
                const notes = [400, 300, 200, 100];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    const t = now + i * 0.12;
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.2);
                });
            }

            playPianoSound(type, now) {
                const ctx = this.audioContext;
                switch(type) {
                    case 'click': this.playPianoNote(now, 523, 0.15); break;
                    case 'reveal': this.playPianoNote(now, 392, 0.2); break;
                    case 'flag': this.playPianoNote(now, 659, 0.25); break;
                    case 'win': this.playPianoWin(now); break;
                    case 'lose': this.playPianoLose(now); break;
                }
            }

            playPianoNote(now, freq, dur) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                filter.type = 'lowpass';
                filter.frequency.value = 2000;
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + dur);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + dur);
            }

            playPianoWin(now) {
                const ctx = this.audioContext;
                const notes = [523, 659, 784, 880, 1047];
                notes.forEach((freq, i) => {
                    this.playPianoNote(now + i * 0.2, freq, 0.5);
                });
            }

            playPianoLose(now) {
                const ctx = this.audioContext;
                const notes = [392, 349, 330, 262];
                notes.forEach((freq, i) => {
                    this.playPianoNote(now + i * 0.25, freq, 0.4);
                });
            }

            playSpaceSound(type, now) {
                const ctx = this.audioContext;
                switch(type) {
                    case 'click': this.playSpaceClick(now); break;
                    case 'reveal': this.playSpaceReveal(now); break;
                    case 'flag': this.playSpaceFlag(now); break;
                    case 'win': this.playSpaceWin(now); break;
                    case 'lose': this.playSpaceLose(now); break;
                }
            }

            playSpaceClick(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            }

            playSpaceReveal(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            }

            playSpaceFlag(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.1);
                osc.frequency.linearRampToValueAtTime(400, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.25);
            }

            playSpaceWin(now) {
                const ctx = this.audioContext;
                const notes = [261, 329, 392, 523, 659];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const t = now + i * 0.25;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.6);
                });
            }

            playSpaceLose(now) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 1);
            }

            playRetroSound(type, now) {
                const ctx = this.audioContext;
                switch(type) {
                    case 'click': this.playRetroBeep(now, 440, 0.05); break;
                    case 'reveal': this.playRetroBeep(now, 330, 0.08); break;
                    case 'flag': this.playRetroFlag(now); break;
                    case 'win': this.playRetroWin(now); break;
                    case 'lose': this.playRetroLose(now); break;
                }
            }

            playRetroBeep(now, freq, dur) {
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.setValueAtTime(0.2, now + dur * 0.8);
                gain.gain.linearRampToValueAtTime(0, now + dur);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + dur);
            }

            playRetroFlag(now) {
                const ctx = this.audioContext;
                [440, 550, 660].forEach((freq, i) => {
                    this.playRetroBeep(now + i * 0.06, freq, 0.05);
                });
            }

            playRetroWin(now) {
                const ctx = this.audioContext;
                const notes = [262, 330, 392, 523, 659, 784];
                notes.forEach((freq, i) => {
                    this.playRetroBeep(now + i * 0.1, freq, 0.1);
                });
            }

            playRetroLose(now) {
                const ctx = this.audioContext;
                const notes = [392, 330, 262, 196];
                notes.forEach((freq, i) => {
                    this.playRetroBeep(now + i * 0.15, freq, 0.12);
                });
            }

            createNoiseBuffer(duration) {
                const ctx = this.audioContext;
                const sampleRate = ctx.sampleRate;
                const bufferSize = sampleRate * duration;
                const buffer = ctx.createBuffer(1, bufferSize, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            startMusic() {
                if (this.musicInterval) return;
                this.init();
                this.musicEnabled = true;
                this.playMusicLoop();
                this.musicInterval = setInterval(() => this.playMusicLoop(), this.getMusicDuration());
            }

            getMusicDuration() {
                switch(this.currentStyle) {
                    case 'nature': return 6000;
                    case 'tech': return 4000;
                    case 'piano': return 8000;
                    case 'space': return 10000;
                    case 'retro': return 3000;
                    default: return 6000;
                }
            }

            playMusicLoop() {
                if (!this.musicEnabled || !this.audioContext) return;
                switch(this.currentStyle) {
                    case 'nature': this.playNatureMusic(); break;
                    case 'tech': this.playTechMusic(); break;
                    case 'piano': this.playPianoMusic(); break;
                    case 'space': this.playSpaceMusic(); break;
                    case 'retro': this.playRetroMusic(); break;
                }
            }

            playNatureMusic() {
                const ctx = this.audioContext;
                const duration = 6;
                const noise = this.createNoiseBuffer(duration);
                const source = ctx.createBufferSource();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();
                source.buffer = noise;
                source.loop = false;
                filter.type = 'bandpass';
                filter.frequency.value = 1500;
                filter.Q.value = 0.3;
                gain.gain.value = 0.08;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.musicGain);
                source.start();
                this.musicNodes.push(source);
            }

            playTechMusic() {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const bpm = 120;
                const beatDur = 60 / bpm;
                for (let i = 0; i < 4; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55;
                    const t = now + i * beatDur;
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + beatDur * 0.8);
                    osc.connect(gain);
                    gain.connect(this.musicGain);
                    osc.start(t);
                    osc.stop(t + beatDur);
                    this.musicNodes.push(osc);
                }
                for (let i = 0; i < 8; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = 880;
                    const t = now + i * beatDur / 2;
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                    osc.connect(gain);
                    gain.connect(this.musicGain);
                    osc.start(t);
                    osc.stop(t + 0.05);
                    this.musicNodes.push(osc);
                }
            }

            playPianoMusic() {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const chords = [[261, 329, 392], [220, 277, 349], [196, 246, 293], [261, 329, 392]];
                chords.forEach((chord, chordIndex) => {
                    const chordStart = now + chordIndex * 2;
                    chord.forEach(freq => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        const filter = ctx.createBiquadFilter();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        filter.type = 'lowpass';
                        filter.frequency.value = 1500;
                        gain.gain.setValueAtTime(0, chordStart);
                        gain.gain.linearRampToValueAtTime(0.1, chordStart + 0.1);
                        gain.gain.linearRampToValueAtTime(0.08, chordStart + 1.5);
                        gain.gain.linearRampToValueAtTime(0, chordStart + 2);
                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(this.musicGain);
                        osc.start(chordStart);
                        osc.stop(chordStart + 2);
                        this.musicNodes.push(osc);
                    });
                });
            }

            playSpaceMusic() {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const drone = ctx.createOscillator();
                const droneGain = ctx.createGain();
                drone.type = 'sine';
                drone.frequency.value = 65;
                droneGain.gain.value = 0.1;
                drone.connect(droneGain);
                droneGain.connect(this.musicGain);
                drone.start(now);
                drone.stop(now + 10);
                this.musicNodes.push(drone);
                for (let i = 0; i < 5; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800 + Math.random() * 400;
                    const t = now + i * 2 + Math.random();
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.03, t + 0.5);
                    gain.gain.linearRampToValueAtTime(0, t + 1.5);
                    osc.connect(gain);
                    gain.connect(this.musicGain);
                    osc.start(t);
                    osc.stop(t + 1.5);
                    this.musicNodes.push(osc);
                }
            }

            playRetroMusic() {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const melody = [262, 294, 330, 349, 392, 349, 330, 294];
                melody.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = freq * 0.5;
                    const t = now + i * 0.375;
                    gain.gain.setValueAtTime(0.08, t);
                    gain.gain.setValueAtTime(0.08, t + 0.3);
                    gain.gain.linearRampToValueAtTime(0, t + 0.375);
                    osc.connect(gain);
                    gain.connect(this.musicGain);
                    osc.start(t);
                    osc.stop(t + 0.375);
                    this.musicNodes.push(osc);
                });
            }

            stopMusic() {
                this.musicEnabled = false;
                if (this.musicInterval) {
                    clearInterval(this.musicInterval);
                    this.musicInterval = null;
                }
                this.musicNodes.forEach(node => { try { node.stop(); } catch(e) {} });
                this.musicNodes = [];
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                return this.soundEnabled;
            }

            toggleMusic() {
                if (this.musicEnabled) this.stopMusic();
                else this.startMusic();
                return this.musicEnabled;
            }
        }

        // ===== 扫雷游戏主类 =====
        class Minesweeper {
            constructor() {
                this.difficulties = {
                    easy: { rows: 9, cols: 9, mines: 10 },
                    medium: { rows: 16, cols: 16, mines: 40 },
                    hard: { rows: 16, cols: 30, mines: 99 },
                    expert: { rows: 20, cols: 35, mines: 248 },
                    hell: { rows: 30, cols: 50, mines: 700 }
                };
                this.MARK_NONE = 0;
                this.MARK_FLAG = 1;
                this.MARK_QUESTION = 2;
                
                // 最佳成绩
                this.bestScores = this.loadBestScores();
                
                // 游戏统计
                this.gameStats = this.loadGameStats();
                
                this.board = [];
                this.revealed = [];
                this.marks = [];
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.timer = 0;
                this.timerInterval = null;
                this.isFullscreen = false;
                this.flagMode = false; // false = 揭示模式, true = 标记模式
                this.isPaused = false;
                
                // 撤销功能
                this.undoStack = [];
                this.maxUndoSteps = 10;
                
                // 提示功能
                this.hintCells = [];
                
                this.soundManager = new SoundManager();

                this.boardElement = document.getElementById('board');
                this.mineCountElement = document.getElementById('mineCount');
                this.timerElement = document.getElementById('timer');
                this.messageElement = document.getElementById('message');
                this.bestScoreElement = document.getElementById('bestScore');
                this.difficultySelect = document.getElementById('difficulty');
                this.newGameButton = document.getElementById('newGame');
                this.fullscreenBtn = document.getElementById('fullscreenBtn');
                this.fsMineCount = document.getElementById('fsMineCount');
                this.fsTimer = document.getElementById('fsTimer');
                this.exitFullscreenBtn = document.getElementById('exitFullscreen');
                this.newGameFsBtn = document.getElementById('newGameFs');
                this.soundBtn = document.getElementById('soundBtn');
                this.musicBtn = document.getElementById('musicBtn');
                this.styleSelect = document.getElementById('styleSelect');
                
                // 新功能按钮
                this.undoBtn = document.getElementById('undoBtn');
                this.hintBtn = document.getElementById('hintBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.statsBtn = document.getElementById('statsBtn');
                this.pauseOverlay = document.getElementById('pauseOverlay');
                this.statsPanel = document.getElementById('statsPanel');

                this.init();
            }

            init() {
                this.newGameButton.addEventListener('click', () => this.newGame());
                this.newGameFsBtn.addEventListener('click', () => this.newGame());
                this.difficultySelect.addEventListener('change', () => this.newGame());
                this.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
                this.exitFullscreenBtn.addEventListener('click', () => this.toggleFullscreen());
                this.modeToggleBtn = document.getElementById('modeToggle');
                this.modeToggleFsBtn = document.getElementById('modeToggleFs');
                this.modeToggleBtn.addEventListener('click', () => this.toggleMode());
                this.modeToggleFsBtn.addEventListener('click', () => this.toggleMode());

                this.soundBtn.addEventListener('click', () => {
                    const enabled = this.soundManager.toggleSound();
                    this.soundBtn.classList.toggle('muted', !enabled);
                    this.soundBtn.textContent = enabled ? '🔊' : '🔇';
                });

                this.musicBtn.addEventListener('click', () => {
                    const enabled = this.soundManager.toggleMusic();
                    this.musicBtn.classList.toggle('muted', !enabled);
                });

                this.styleSelect.addEventListener('change', (e) => {
                    this.soundManager.setStyle(e.target.value);
                });

                // 撤销按钮
                this.undoBtn.addEventListener('click', () => this.undo());
                
                // 提示按钮
                this.hintBtn.addEventListener('click', () => this.showHint());
                
                // 暂停按钮
                this.pauseBtn.addEventListener('click', () => this.togglePause());
                document.getElementById('resumeBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('newGameFromPause').addEventListener('click', () => {
                    this.togglePause();
                    this.newGame();
                });
                
                // 统计按钮
                this.statsBtn.addEventListener('click', () => this.showStatsPanel());
                document.getElementById('closeStatsBtn').addEventListener('click', () => this.hideStatsPanel());

                // 键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (this.isFullscreen) this.toggleFullscreen();
                        if (this.statsPanel.classList.contains('active')) this.hideStatsPanel();
                    }
                    if (e.key === ' ' && !this.gameOver && !this.firstClick) {
                        e.preventDefault();
                        this.togglePause();
                    }
                    if (e.key === 'h' || e.key === 'H') {
                        if (!this.gameOver && !this.isPaused) this.showHint();
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                        e.preventDefault();
                        this.undo();
                    }
                });

                this.boardElement.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // 使用事件委托优化性能
                this.boardElement.addEventListener('click', (e) => this.handleBoardClick(e));
                this.boardElement.addEventListener('dblclick', (e) => this.handleBoardDoubleClick(e));
                this.boardElement.addEventListener('mousedown', (e) => {
                    if (e.button === 2) {
                        e.preventDefault();
                        this.handleBoardRightClick(e);
                    }
                });
                
                // 触摸事件处理
                let touchTimer = null;
                let touchStartCell = null;
                this.boardElement.addEventListener('touchstart', (e) => {
                    const cell = e.target.closest('.cell');
                    if (cell) {
                        touchStartCell = cell;
                        touchTimer = setTimeout(() => {
                            if (touchStartCell) {
                                this.handleBoardRightClick({ target: touchStartCell, preventDefault: () => {} });
                            }
                        }, 500);
                    }
                });
                this.boardElement.addEventListener('touchend', () => {
                    if (touchTimer) clearTimeout(touchTimer);
                    touchStartCell = null;
                });
                this.boardElement.addEventListener('touchmove', () => {
                    if (touchTimer) clearTimeout(touchTimer);
                    touchStartCell = null;
                });
                  
                // 窗口大小变化时重新计算格子大小
                window.addEventListener('resize', () => {
                    this.updateCellSize();
                });
                
                this.newGame();
            }

            toggleFullscreen() {
                this.isFullscreen = !this.isFullscreen;
                document.getElementById('gamePage').classList.toggle('fullscreen', this.isFullscreen);
                this.fullscreenBtn.textContent = this.isFullscreen ? '✕' : '⛶';
            }
            
            toggleMode() {
                this.flagMode = !this.flagMode;
                this.updateModeButtons();
            }

            updateModeButtons() {
                const modeIcon = this.flagMode ? '🚩' : '🔍';
                const modeClass = this.flagMode ? 'flag' : 'reveal';
                
                // 更新普通模式按钮
                this.modeToggleBtn.querySelector('.mode-icon').textContent = modeIcon;
                this.modeToggleBtn.className = 'mode-btn ' + modeClass;
                
                // 更新全屏模式按钮
                this.modeToggleFsBtn.querySelector('.mode-icon').textContent = modeIcon;
                this.modeToggleFsBtn.className = 'mode-btn ' + modeClass + ' fullscreen-mode-toggle';
            }

            newGame() {
                const difficulty = this.difficulties[this.difficultySelect.value];
                this.rows = difficulty.rows;
                this.cols = difficulty.cols;
                this.totalMines = difficulty.mines;
                this.flaggedCount = 0;
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.timer = 0;
                this.isPaused = false;

                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }

                this.board = [];
                this.revealed = [];
                this.marks = [];
                
                // 重置撤销栈
                this.undoStack = [];
                this.undoBtn.disabled = true;
                
                // 清除提示
                this.hintCells = [];

                for (let i = 0; i < this.rows; i++) {
                    this.board[i] = [];
                    this.revealed[i] = [];
                    this.marks[i] = [];
                    for (let j = 0; j < this.cols; j++) {
                        this.board[i][j] = 0;
                        this.revealed[i][j] = false;
                        this.marks[i][j] = this.MARK_NONE;
                    }
                }

                this.updateMineCount();
                this.timerElement.textContent = '000';
                this.fsTimer.textContent = '000';
                this.bestScoreElement.textContent = this.formatBestScore(this.difficultySelect.value);
                this.messageElement.className = 'message';
                this.messageElement.style.display = 'none';
                
                // 隐藏暂停界面
                this.pauseOverlay.classList.remove('active');
                
                // 大棋盘检测，添加响应式类
                const gamePage = document.getElementById('gamePage');
                const totalCells = this.rows * this.cols;
                if (totalCells > 400) {
                    gamePage.classList.add('large-board');
                } else {
                    gamePage.classList.remove('large-board');
                }

                this.renderBoard();
            }

            updateCellSize() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const isFullscreen = this.isFullscreen;
                
                // 计算可用空间 - 更精确地计算UI占用空间
                let availableWidth, availableHeight;
                if (isFullscreen) {
                    availableWidth = viewportWidth - 50;
                    availableHeight = viewportHeight - 100;
                } else {
                    // 非全屏：更精确计算UI占用（标题50+控制栏50+状态栏40+底部提示30+边距50）
                    availableWidth = viewportWidth - 50;
                    availableHeight = viewportHeight - 220;
                }
                
                // 格子大小 = 可用空间 / 格子数量
                const gapSize = 1;
                const boardPadding = 10;
                const cellWidth = Math.floor((availableWidth - boardPadding * 2 - gapSize * (this.cols - 1)) / this.cols);
                const cellHeight = Math.floor((availableHeight - boardPadding * 2 - gapSize * (this.rows - 1)) / this.rows);
                
                // 取较小值，最小10px确保可点击
                const cellSize = Math.max(10, Math.min(cellWidth, cellHeight));
                const fontSize = cellSize < 14 ? '0.4rem' : cellSize < 18 ? '0.5rem' : cellSize < 24 ? '0.6rem' : '0.75rem';
                
                document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
                document.documentElement.style.setProperty('--cell-font-size', fontSize);
            }

            updateMineCount() {
                const remaining = this.totalMines - this.flaggedCount;
                this.mineCountElement.textContent = remaining;
                this.fsMineCount.textContent = remaining;
            }

            placeMines(excludeRow, excludeCol) {
                let minesPlaced = 0;
                const excludeSet = new Set();
                
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const r = excludeRow + i;
                        const c = excludeCol + j;
                        if (r >= 0 && r < this.rows && c >= 0 && c < this.cols) {
                            excludeSet.add(`${r},${c}`);
                        }
                    }
                }

                while (minesPlaced < this.totalMines) {
                    const row = Math.floor(Math.random() * this.rows);
                    const col = Math.floor(Math.random() * this.cols);
                    
                    if (this.board[row][col] !== -1 && !excludeSet.has(`${row},${col}`)) {
                        this.board[row][col] = -1;
                        minesPlaced++;
                    }
                }

                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.board[i][j] !== -1) {
                            this.board[i][j] = this.countAdjacentMines(i, j);
                        }
                    }
                }
            }

            countAdjacentMines(row, col) {
                let count = 0;
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const newRow = row + i;
                        const newCol = col + j;
                        if (newRow >= 0 && newRow < this.rows && 
                            newCol >= 0 && newCol < this.cols && 
                            this.board[newRow][newCol] === -1) {
                            count++;
                        }
                    }
                }
                return count;
            }

            countAdjacentFlags(row, col) {
                let count = 0;
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const newRow = row + i;
                        const newCol = col + j;
                        if (newRow >= 0 && newRow < this.rows && 
                            newCol >= 0 && newCol < this.cols && 
                            this.marks[newRow][newCol] === this.MARK_FLAG) {
                            count++;
                        }
                    }
                }
                return count;
            }

            getCellPosition(target) {
                let cell = target;
                while (cell && !cell.classList.contains('cell')) {
                    cell = cell.parentElement;
                }
                if (!cell || !cell.dataset) return null;
                return { row: parseInt(cell.dataset.row), col: parseInt(cell.dataset.col) };
            }

            renderBoard() {
                this.boardElement.innerHTML = '';
                this.boardElement.style.gridTemplateColumns = `repeat(${this.cols}, 1fr)`;
                
                // 计算格子大小
                this.updateCellSize();
                
                const fragment = document.createDocumentFragment();
                
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell hidden';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        fragment.appendChild(cell);
                    }
                }

                this.boardElement.appendChild(fragment);
            }

            // 事件委托处理点击
            handleBoardClick(e) {
                if (this.isPaused) return;
                const cell = e.target.closest('.cell');
                if (!cell) return;
                
                const pos = this.getCellPosition(cell);
                if (!pos) return;
                this.handleClick(pos.row, pos.col);
            }

            handleBoardDoubleClick(e) {
                if (this.isPaused) return;
                const cell = e.target.closest('.cell');
                if (!cell) return;
                
                const pos = this.getCellPosition(cell);
                if (!pos) return;
                this.handleDoubleClick(pos.row, pos.col);
            }

            handleBoardRightClick(e) {
                if (this.isPaused) return;
                const cell = e.target.closest('.cell');
                if (!cell) return;
                
                const pos = this.getCellPosition(cell);
                if (!pos) return;
                this.handleRightClick(pos.row, pos.col);
            }

            handleClick(row, col) {
                if (this.gameOver || this.isPaused) return;
            
                // 如果在标记模式下，执行标记操作
                if (this.flagMode) {
                    this.handleRightClick(row, col);
                    return;
                }
            
                if (this.marks[row][col] !== this.MARK_NONE) return;
                            
                // 保存撤销状态
                this.saveUndoState();
                            
                this.soundManager.playSound('click');
            
                if (this.firstClick) {
                    this.firstClick = false;
                    this.placeMines(row, col);
                    this.startTimer();
                }
            
                this.reveal(row, col);
                this.checkWin();
            }
            
            handleDoubleClick(row, col) {
                if (this.gameOver || this.isPaused) return;
            
                if (!this.revealed[row][col] || this.board[row][col] <= 0) return;
                const adjacentFlags = this.countAdjacentFlags(row, col);
                const adjacentMines = this.board[row][col];
            
                if (adjacentFlags === adjacentMines) {
                    this.saveUndoState();
                    this.chordReveal(row, col);
                    this.checkWin();
                }
            }
            
            chordReveal(row, col) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const newRow = row + i;
                        const newCol = col + j;
                        if (newRow >= 0 && newRow < this.rows &&
                            newCol >= 0 && newCol < this.cols &&
                            !this.revealed[newRow][newCol] &&
                            this.marks[newRow][newCol] === this.MARK_NONE) {
                            this.reveal(newRow, newCol);
                        }
                    }
                }
            }
            
            handleRightClick(row, col) {
                if (this.gameOver || this.isPaused) return;
            
                if (this.revealed[row][col]) return;
            
                this.saveUndoState();
                            
                const oldMark = this.marks[row][col];
                this.marks[row][col] = (this.marks[row][col] + 1) % 3;
                            
                if (oldMark === this.MARK_FLAG) this.flaggedCount--;
                if (this.marks[row][col] === this.MARK_FLAG) {
                    this.flaggedCount++;
                    this.soundManager.playSound('flag');
                }
                            
                this.updateMineCount();
                this.updateCell(row, col);
                this.checkAllMinesFlagged();
            }

            checkAllMinesFlagged() {
                if (this.gameOver || this.flaggedCount !== this.totalMines) return;
                
                let allCorrect = true;
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.marks[i][j] === this.MARK_FLAG && this.board[i][j] !== -1) {
                            allCorrect = false;
                            break;
                        }
                    }
                    if (!allCorrect) break;
                }
                
                if (allCorrect) {
                    this.revealAllNonMines();
                    this.gameOver = true;
                    this.gameWon = true;
                    this.endGame(true);
                }
            }

            revealAllNonMines() {
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.board[i][j] !== -1 && !this.revealed[i][j]) {
                            this.revealed[i][j] = true;
                            this.updateCell(i, j);
                        }
                    }
                }
            }

            reveal(row, col) {
                if (row < 0 || row >= this.rows || col < 0 || col >= this.cols) return;
                if (this.revealed[row][col] || this.marks[row][col] === this.MARK_FLAG) return;

                this.revealed[row][col] = true;
                this.updateCell(row, col);

                if (this.board[row][col] === -1) {
                    this.gameOver = true;
                    this.revealAllMines();
                    this.endGame(false);
                    return;
                }

                this.soundManager.playSound('reveal');

                if (this.board[row][col] === 0) {
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            this.reveal(row + i, col + j);
                        }
                    }
                }
            }

            updateCell(row, col) {
                const cellIndex = row * this.cols + col;
                const cell = this.boardElement.children[cellIndex];
                if (!cell) return;

                if (this.revealed[row][col]) {
                    cell.className = 'cell revealed';
                    if (this.board[row][col] === -1) {
                        cell.classList.add('mine');
                        cell.innerHTML = '<span class="mine-icon">💣</span>';
                    } else if (this.board[row][col] > 0) {
                        cell.textContent = this.board[row][col];
                        cell.dataset.number = this.board[row][col];
                    }
                } else {
                    cell.className = 'cell hidden';
                    if (this.marks[row][col] === this.MARK_FLAG) {
                        cell.classList.add('flagged');
                        cell.innerHTML = '<span class="flag">🚩</span>';
                    } else if (this.marks[row][col] === this.MARK_QUESTION) {
                        cell.classList.add('question');
                        cell.innerHTML = '<span class="question-mark">?</span>';
                    } else {
                        cell.textContent = '';
                    }
                }
            }

            revealAllMines() {
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.board[i][j] === -1) {
                            this.revealed[i][j] = true;
                            this.updateCell(i, j);
                        }
                    }
                }
            }

            checkWin() {
                let revealedCount = 0;
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.revealed[i][j]) revealedCount++;
                    }
                }

                if (revealedCount === this.rows * this.cols - this.totalMines) {
                    this.gameOver = true;
                    this.gameWon = true;
                    this.endGame(true);
                }
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timer++;
                    const timeStr = String(this.timer).padStart(3, '0');
                    this.timerElement.textContent = timeStr;
                    this.fsTimer.textContent = timeStr;
                }, 1000);
            }

            // 加载最佳成绩
            loadBestScores() {
                const defaultScores = { easy: null, medium: null, hard: null, expert: null, hell: null };
                try {
                    const saved = localStorage.getItem('minesweeper_best_scores');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // 合并确保所有难度都有值
                        return { ...defaultScores, ...parsed };
                    }
                } catch (e) {
                    console.warn('加载最佳成绩失败:', e);
                }
                return defaultScores;
            }
            
            // 保存最佳成绩
            saveBestScore(difficulty, time) {
                if (this.bestScores[difficulty] === null || time < this.bestScores[difficulty]) {
                    this.bestScores[difficulty] = time;
                    localStorage.setItem('minesweeper_best_scores', JSON.stringify(this.bestScores));
                    return true; // 新纪录
                }
                return false;
            }
            
            // 格式化最佳成绩显示
            formatBestScore(difficulty) {
                // 确保bestScores已初始化
                if (!this.bestScores) {
                    this.bestScores = { easy: null, medium: null, hard: null, expert: null, hell: null };
                }
                const score = this.bestScores[difficulty];
                return (score !== null && score !== undefined) ? score + '秒' : '--';
            }

            endGame(won) {
                clearInterval(this.timerInterval);
                this.soundManager.playSound(won ? 'win' : 'lose');
                
                // 更新游戏统计
                this.updateGameStats(won);
                
                const emoji = won ? '🎉' : '💥';
                const text = won ? '恭喜你赢了！' : '游戏结束！';
                const diffLabel = this.difficultySelect.options[this.difficultySelect.selectedIndex].text;
                const difficulty = this.difficultySelect.value;
                
                // 检查是否创造新纪录
                let newRecord = false;
                let recordText = '';
                if (won) {
                    newRecord = this.saveBestScore(difficulty, this.timer);
                    if (newRecord) {
                        recordText = '<span class="new-record">🏆 新纪录！</span>';
                    }
                }
                
                const bestScore = this.formatBestScore(difficulty);
                
                this.messageElement.innerHTML = `
                    <span class="emoji">${emoji}</span>
                    <span class="text">${text}</span>
                    ${recordText}
                    <span class="stats-info">难度: ${diffLabel} | 用时: ${this.timer}秒 | 最佳: ${bestScore}</span>
                    <button onclick="document.getElementById('newGame').click()">再来一局</button>
                `;
                this.messageElement.className = `message ${won ? 'win' : 'lose'}`;
                this.messageElement.style.display = 'flex';
            }
            
            // ===== 撤销功能 =====
            saveUndoState() {
                const state = {
                    revealed: this.revealed.map(row => [...row]),
                    marks: this.marks.map(row => [...row]),
                    flaggedCount: this.flaggedCount
                };
                this.undoStack.push(state);
                if (this.undoStack.length > this.maxUndoSteps) {
                    this.undoStack.shift();
                }
                this.undoBtn.disabled = false;
            }
            
            undo() {
                if (this.undoStack.length === 0 || this.gameOver || this.isPaused) return;
                
                const state = this.undoStack.pop();
                this.revealed = state.revealed;
                this.marks = state.marks;
                this.flaggedCount = state.flaggedCount;
                
                // 重新渲染棋盘
                this.updateAllCells();
                this.updateMineCount();
                
                this.undoBtn.disabled = this.undoStack.length === 0;
            }
            
            updateAllCells() {
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        this.updateCell(i, j);
                    }
                }
            }
            
            // ===== 提示功能 =====
            showHint() {
                if (this.gameOver || this.isPaused || this.firstClick) return;
                
                // 清除之前的提示
                this.clearHints();
                
                // 寻找安全的格子
                const safeCells = [];
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (!this.revealed[i][j] && 
                            this.marks[i][j] === this.MARK_NONE && 
                            this.board[i][j] !== -1) {
                            // 优先选择有数字的格子
                            if (this.board[i][j] > 0) {
                                safeCells.unshift({ row: i, col: j, priority: 1 });
                            } else {
                                safeCells.push({ row: i, col: j, priority: 0 });
                            }
                        }
                    }
                }
                
                if (safeCells.length === 0) return;
                
                // 随机选择一个安全格子
                const randomIndex = Math.floor(Math.random() * Math.min(3, safeCells.length));
                const hintCell = safeCells[randomIndex];
                
                // 标记提示格子
                const cellIndex = hintCell.row * this.cols + hintCell.col;
                const cell = this.boardElement.children[cellIndex];
                if (cell) {
                    cell.classList.add('hint');
                    this.hintCells.push(cell);
                }
                
                // 3秒后自动清除提示
                setTimeout(() => this.clearHints(), 3000);
            }
            
            clearHints() {
                this.hintCells.forEach(cell => {
                    cell.classList.remove('hint');
                });
                this.hintCells = [];
            }
            
            // ===== 暂停功能 =====
            togglePause() {
                if (this.gameOver || this.firstClick) return;
                
                this.isPaused = !this.isPaused;
                
                if (this.isPaused) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                    this.pauseOverlay.classList.add('active');
                } else {
                    this.startTimer();
                    this.pauseOverlay.classList.remove('active');
                }
            }
            
            // ===== 统计功能 =====
            loadGameStats() {
                const defaultStats = {
                    totalGames: 0,
                    totalWins: 0,
                    totalTime: 0,
                    gamesByDifficulty: { easy: 0, medium: 0, hard: 0, expert: 0, hell: 0 },
                    winsByDifficulty: { easy: 0, medium: 0, hard: 0, expert: 0, hell: 0 }
                };
                try {
                    const saved = localStorage.getItem('minesweeper_game_stats');
                    if (saved) {
                        return { ...defaultStats, ...JSON.parse(saved) };
                    }
                } catch (e) {
                    console.warn('加载游戏统计失败:', e);
                }
                return defaultStats;
            }
            
            updateGameStats(won) {
                const difficulty = this.difficultySelect.value;
                this.gameStats.totalGames++;
                this.gameStats.totalTime += this.timer;
                this.gameStats.gamesByDifficulty[difficulty]++;
                
                if (won) {
                    this.gameStats.totalWins++;
                    this.gameStats.winsByDifficulty[difficulty]++;
                }
                
                localStorage.setItem('minesweeper_game_stats', JSON.stringify(this.gameStats));
            }
            
            showStatsPanel() {
                document.getElementById('totalGames').textContent = this.gameStats.totalGames;
                document.getElementById('totalWins').textContent = this.gameStats.totalWins;
                
                const winRate = this.gameStats.totalGames > 0 
                    ? Math.round(this.gameStats.totalWins / this.gameStats.totalGames * 100) 
                    : 0;
                document.getElementById('winRate').textContent = winRate + '%';
                
                const totalMinutes = Math.floor(this.gameStats.totalTime / 60);
                document.getElementById('totalTime').textContent = totalMinutes + '分钟';
                
                const avgTime = this.gameStats.totalGames > 0 
                    ? Math.round(this.gameStats.totalTime / this.gameStats.totalGames) 
                    : '--';
                document.getElementById('avgTime').textContent = avgTime !== '--' ? avgTime + '秒' : avgTime;
                
                this.statsPanel.classList.add('active');
            }
            
            hideStatsPanel() {
                this.statsPanel.classList.remove('active');
            }
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            const coverAnimation = new CoverAnimation();
            const gamePage = document.getElementById('gamePage');
            const coverPage = document.getElementById('coverPage');
            const startBtn = document.getElementById('startBtn');
            
            // 主题切换功能
            let isDarkTheme = true;
            const themeToggleCover = document.getElementById('themeToggleCover');
            
            function toggleTheme() {
                isDarkTheme = !isDarkTheme;
                document.body.classList.toggle('dark-theme', isDarkTheme);
                document.body.classList.toggle('light-theme', !isDarkTheme);
                themeToggleCover.textContent = isDarkTheme ? '🌙' : '☀️';
                localStorage.setItem('minesweeper_theme', isDarkTheme ? 'dark' : 'light');
            }
            
            // 加载保存的主题
            const savedTheme = localStorage.getItem('minesweeper_theme');
            if (savedTheme === 'light') {
                isDarkTheme = false;
                document.body.classList.add('light-theme');
                document.body.classList.remove('dark-theme');
                themeToggleCover.textContent = '☀️';
            } else {
                document.body.classList.add('dark-theme');
            }
            
            themeToggleCover.addEventListener('click', toggleTheme);

            startBtn.addEventListener('click', () => {
                coverPage.classList.add('hidden');
                setTimeout(() => {
                    gamePage.classList.add('active');
                    new Minesweeper();
                }, 500);
            });
        });
    </script>
